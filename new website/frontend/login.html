<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spiritual Home - Login</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            background:linear-gradient(135deg,#081120,#141b2d,#2b2238);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .login-box{
            width:100%;
            max-width:480px;
            background:rgba(20,28,45,.95);
            border:1px solid rgba(255,255,255,.08);
            border-radius:25px;
            padding:45px 35px;
            box-shadow:0 15px 40px rgba(0,0,0,.35);
        }

        .logo{
            text-align:center;
            margin-bottom:10px;
        }

        .logo img{
            width:70px;
            height:70px;
            border-radius:50%;
            object-fit:cover;
        }

        h1{
            text-align:center;
            color:#fff;
            font-size:42px;
            margin-top:10px;
        }

        .sub{
            text-align:center;
            color:#a8a8a8;
            margin:10px 0 30px;
        }

        .sub a{
            color:#ff9f00;
            text-decoration:none;
            font-weight:600;
        }

        input{
            width:100%;
            padding:18px;
            margin-bottom:18px;
            border-radius:14px;
            border:1px solid #44506a;
            background:#2b3548;
            color:#fff;
            font-size:16px;
            outline:none;
        }

        input::placeholder{
            color:#b5b5b5;
        }

        button{
            width:100%;
            padding:18px;
            border:none;
            border-radius:14px;
            background:#ff9800;
            color:#fff;
            font-size:18px;
            font-weight:600;
            cursor:pointer;
            transition:.3s;
        }

        button:hover{
            background:#ffad1f;
        }

        @media(max-width:600px){

            .login-box{
                padding:35px 20px;
            }

            h1{
                font-size:34px;
            }

        }
    </style>
</head>

<body>

    <div class="login-box">

        <!-- Optional Logo -->
        <div class="logo">
            <img src="https://res.cloudinary.com/dp0pkoszf/image/upload/v1781939415/png_hbci07.png" alt="Logo">
        </div>

        <h1>Sign In</h1>

        <p class="sub">
            Don't have an account?
            <a href="register.html">Register here</a>
        </p>

        <form action="index.html">

            <input
                type="email"
                placeholder="Email Address"
                required
            >

            <input
                type="password"
                placeholder="Password"
                required
            >

            <button type="submit">
                Sign In
            </button>

        </form>

    </div>
  

</body>
</html>
